<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>마린톡 고정밀 스마트 항로기</title>
    <!-- 외부 토큰이나 서버 인증 없이 안정적으로 구동되는 Leaflet 엔진 로드 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- 입체 지구본 연출을 위한 오픈소스 그래픽 모듈 -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --primary-color: #005A64;
            --bg-color: #050b14;
            --card-bg: rgba(255, 255, 255, 0.96);
            --accent-red: #ea4335;
            --accent-blue: #007aff;
            --text-dark: #111111;
            --text-muted: #666666;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: var(--bg-color); height: 100vh; display: flex; flex-direction: column; overflow: hidden; color: white; }
        
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; }
        .screen.active { display: flex; }

        /* 1단계: 심플 요약 툴 + 항로 미리보기 */
        #screen-summary { justify-content: center; align-items: center; padding: 20px; background: radial-gradient(circle at center, #102a43 0%, #050b14 100%); }
        .summary-card { background: rgba(255, 255, 255, 0.08); padding: 30px 20px; border-radius: 24px; width: 100%; max-width: 360px; backdrop-filter: blur(20px); box-shadow: 0 20px 50px rgba(0,0,0,0.6); text-align: center; border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; gap: 15px; }
        .summary-title { font-size: 24px; font-weight: bold; }
        
        /* ★ [신규 추가] 카드 내 항로 미리보기 세션 */
        .route-preview-box { background-color: rgba(255, 255, 255, 0.95); border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); text-align: left; color: var(--text-dark); }
        .route-preview-graphic { height: 100px; background: linear-gradient(45deg, #1b4965, #112a43); display: flex; justify-content: center; align-items: center; position: relative; color: rgba(255,255,255,0.85); font-size: 13px; font-weight: 500; }
        .route-preview-graphic::before { content: "🚢"; font-size: 32px; opacity: 0.3; animation: FloatShip 3s ease-in-out infinite; }
        @keyframes FloatShip { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
        .route-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background-color: #edf2f7; }
        .route-info-item { background-color: #ffffff; padding: 12px; text-align: center; }
        .route-info-item span { display: block; font-size: 10px; color: var(--text-muted); margin-bottom: 2px; font-weight: 600; }
        .route-info-item strong { font-size: 15px; color: var(--text-dark); font-weight: 700; }

        .coords { font-size: 14px; color: #9fb3c8; background: rgba(0,0,0,0.5); padding: 12px; border-radius: 12px; font-family: monospace; border: 1px solid rgba(255,255,255,0.05); margin-top: 5px; }
        .btn-next { background-color: #ffffff; color: #102a43; border: none; padding: 16px 32px; border-radius: 30px; font-size: 16px; font-weight: bold; width: 100%; cursor: pointer; box-shadow: 0 4px 15px rgba(255,255,255,0.1); }

        /* 2단계: 스마트 지도 공간 */
        #map-container { position: relative; flex: 1; width: 100%; height: 100%; background: #02060c; }
        #map { width: 100%; height: 100%; }
        
        /* 3D 전체 지구본 레이어 (줌아웃 시 노출) */
        #globe-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; justify-content: center; align-items: center; background: #02060c; z-index: 500; }
        #globe-svg { width: 100%; height: 90%; max-height: 550px; }
        
        .water { fill: #0d1b2a; }
        .land { fill: #1b4965; stroke: #62b6cb; stroke-width: 0.5px; }
        .graticule { fill: none; stroke: rgba(255, 255, 255, 0.06); stroke-width: 0.5px; }

        /* 하단 오버레이 정보창 */
        .map-overlay { position: absolute; bottom: 32px; left: 5%; width: 90%; background: var(--card-bg); border-radius: 24px; padding: 22px; box-shadow: 0 10px 35px rgba(0,0,0,0.4); z-index: 1000; color: #222; backdrop-filter: blur(10px); }
        .status-grid { display: flex; justify-content: space-between; text-align: center; margin-bottom: 18px; }
        .status-item span { display: block; font-size: 11px; color: #666; margin-bottom: 4px; font-weight: 600; }
        .status-item strong { font-size: 17px; color: #111; font-weight: 700; }
        .btn-back { background-color: var(--primary-color); color: white; border: none; padding: 14px; border-radius: 14px; width: 100%; font-size: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <!-- 1단계: 메인 요약 툴 화면 (항로 미리보기 추가됨) -->
    <div id="screen-summary" class="screen active">
        <div class="summary-card">
            <div class="summary-title">⚓ 마린톡 스마트 지도</div>
            
            <!-- [신규 주입] 항로 미리보기 카드 패널 -->
            <div class="route-preview-box">
                <div class="route-preview-graphic">
                    <span>관제 항로 실시간 연동됨</span>
                </div>
                <div class="route-info-grid">
                    <div class="route-info-item"><span>총 이동거리</span><strong>160.3 km</strong></div>
                    <div class="route-info-item"><span>항해일수</span><strong>15일</strong></div>
                </div>
            </div>

            <p style="font-size: 13px; color: #9fb3c8; line-height: 1.4;">확대 시 정밀 구글 평면 지도로,<br>축소 시 둥근 전체 지구본 모양으로 자동 전환됩니다.</p>
            <div class="coords" id="sum-coords">하이브리드 GPS 수신 중...</div>
            <button class="btn-next" onclick="switchScreen('screen-map')">스마트 지도 열기 🗺️</button>
        </div>
    </div>

    <!-- 2단계: 지도 공간 -->
    <div id="screen-map" class="screen">
        <div id="map-container">
            <!-- 2D 구글 평면 지도 베이스 -->
            <div id="map"></div>
            
            <!-- 3D 전체 지구본 레이어 -->
            <div id="globe-layer">
                <svg id="globe-svg"></svg>
            </div>

            <!-- 하단 안내창 -->
            <div class="map-overlay">
                <div class="status-grid">
                    <div class="status-item"><span>실시간 상태</span><strong id="map-status">수신 중</strong></div>
                    <div class="status-item"><span>정밀 위도</span><strong id="map-lat">--</strong></div>
                    <div class="status-item"><span>정밀 경도</span><strong id="map-lng">--</strong></div>
                </div>
                <button class="btn-back" onclick="switchScreen('screen-summary')">돌아가기</button>
            </div>
        </div>
    </div>

    <script>
        let map;
        let leafletMarker;
        let lastLat = 36.33267, lastLng = 127.43478;
        let stayStartTime = null;
        const STAY_THRESHOLD = 10 * 60 * 1000; 
        let isUserInteracting = false;

        // --- 🌍 3D 정형 전체 지구본 그래픽 엔진 설정 ---
        const svg = d3.select("#globe-svg");
        const w = window.innerWidth;
        const h = window.innerHeight * 0.55;
        const baseScale = Math.min(w, h) * 0.43;

        const projection = d3.geoOrthographic().scale(baseScale).translate([w / 2, h / 2]).clipAngle(90);
        const path = d3.geoPath().projection(projection);
        const graticule = d3.geoGraticule();

        svg.append("circle").attr("cx", w/2).attr("cy", h/2).attr("r", projection.scale()).attr("class", "water");
        svg.append("path").datum(graticule).attr("class", "graticule").attr("d", path);
        
        let landPath;
        d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/world/110m.json").then(world => {
            landPath = svg.append("path").datum(topojson.feature(world, world.objects.land)).attr("class", "land").attr("d", path);
            drawGlobeMarker();
        });

        // --- 🛠️ 고정밀 튐 방지 칼만 필터 엔진 ---
        let Q = 0.00001, R = 0.0001;  
        let x_lat = 0, p_lat = 1, x_lng = 0, p_lng = 1, isFirstFilter = true;
        function filterGPS(lat, lng) {
            if (isFirstFilter) { x_lat = lat; x_lng = lng; isFirstFilter = false; return { lat, lng }; }
            p_lat += Q; let k_lat = p_lat / (p_lat + R); x_lat += k_lat * (lat - x_lat); p_lat = (1 - k_lat) * p_lat;
            p_lng += Q; let k_lng = p_lng / (p_lng + R); x_lng += k_lng * (lng - x_lng); p_lng = (1 - k_lng) * p_lng;
            return { lat: x_lat, lng: x_lng };
        }

        // --- 🛠️ 2D 구글 평면 지도 초기화 ---
        function initLeafletMap(lat, lng) {
            map = L.map('map', { zoomControl: false, minZoom: 2, maxZoom: 19 }).setView([lat, lng], 14);

            L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
                attribution: '© Google Maps'
            }).addTo(map);

            leafletMarker = L.circleMarker([lat, lng], {
                radius: 10,
                fillColor: "var(--accent-blue)",
                color: "#ffffff",
                weight: 3,
                fillOpacity: 0.9
            }).addTo(map);

            map.on('movestart', () => { isUserInteracting = true; });
            map.on('moveend', () => { setTimeout(() => { isUserInteracting = false; }, 3000); });

            map.on('zoomend', () => {
                const currentZoom = map.getZoom();
                const globeLayerEl = document.getElementById('globe-layer');
                
                if (currentZoom <= 3) {
                    globeLayerEl.style.display = 'flex';
                    projection.rotate([-lastLng, -lastLat]);
                    if (landPath) landPath.attr("d", path);
                    svg.selectAll("path").attr("d", path);
                    drawGlobeMarker();
                } else {
                    globeLayerEl.style.display = 'none';
                }
            });
        }

        function drawGlobeMarker() {
            svg.selectAll(".target-marker").remove();
            const coordinate = [lastLng, lastLat];
            const gdistance = d3.geoDistance(coordinate, projection.invert([w/2, h/2]));
            
            if (gdistance < Math.PI / 2) {
                const pt = projection(coordinate);
                if (!pt) return;
                
                let isStopped = false;
                if (stayStartTime && (new Date() - stayStartTime >= STAY_THRESHOLD)) isStopped = true;

                svg.append("circle")
                    .attr("cx", pt[0]).attr("cy", pt[1]).attr("r", 9)
                    .attr("class", "target-marker")
                    .style("fill", isStopped ? "var(--accent-red)" : "var(--accent-blue)")
                    .style("stroke", "#ffffff").style("stroke-width", "2px");
            }
        }

        const dragBehavior = d3.drag().on("drag", (event) => {
            const r = projection.rotate();
            projection.rotate([r[0] + event.dx * 0.25, r[1] - event.dy * 0.25]);
            svg.selectAll("path").attr("d", path);
            drawGlobeMarker();
        });
        svg.call(dragBehavior);

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            
            if (screenId === 'screen-map') {
                isUserInteracting = false;
                document.getElementById('globe-layer').style.display = 'none';
                if (!map) {
                    initLeafletMap(lastLat, lastLng);
                } else {
                    map.invalidateSize();
                    map.setView([lastLat, lastLng], 14);
                }
            }
        }

        function updateLocation(position) {
            let rawLat = position.coords.latitude;
            let rawLng = position.coords.longitude;
            if (isNaN(rawLat) || isNaN(rawLng)) return;

            const filtered = filterGPS(rawLat, rawLng);
            const lat = filtered.lat;
            const lng = filtered.lng;

            if (lastLat.toFixed(4) === lat.toFixed(4) && lastLng.toFixed(4) === lng.toFixed(4)) {
                if (!stayStartTime) stayStartTime = new Date();
                if (new Date() - stayStartTime >= STAY_THRESHOLD) {
                    document.getElementById('map-status').innerText = "10분 정체 중";
                    document.getElementById('map-status').style.color = "var(--accent-red)";
                    if (leafletMarker) leafletMarker.setStyle({ fillColor: "var(--accent-red)" });
                }
            } else {
                stayStartTime = new Date();
                document.getElementById('map-status').innerText = "정상 이동 중";
                document.getElementById('map-status').style.color = "#111";
                if (leafletMarker) leafletMarker.setStyle({ fillColor: "var(--accent-blue)" });
            }

            lastLat = lat; lastLng = lng;

            document.getElementById('sum-coords').innerText = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
            document.getElementById('map-lat').innerText = lat.toFixed(5);
            document.getElementById('map-lng').innerText = lng.toFixed(5);

            if (map) {
                leafletMarker.setLatLng([lat, lng]);
                if (!isUserInteracting && document.getElementById('globe-layer').style.display === 'none') {
                    map.setView([lat, lng]);
                }
            }
        }

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(updateLocation, () => {}, { enableHighAccuracy: false, timeout: 4000 });
            navigator.geolocation.watchPosition(updateLocation, () => {}, { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 });
        }
    </script>
</body>
</html>
